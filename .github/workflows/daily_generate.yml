name: Daily Estj Fox Draft Generation

on:
  workflow_dispatch:
  schedule:
    # 00:00 UTC = 09:00 Asia/Seoul
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  generate-drafts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-5.4' }}
      MAX_TOPICS_PER_RUN: ${{ secrets.MAX_TOPICS_PER_RUN || '5' }}
      LOCALE: ${{ secrets.LOCALE || 'ko-KR' }}
      TIMEZONE: ${{ secrets.TIMEZONE || 'Asia/Seoul' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily draft pipeline
        run: python main.py
