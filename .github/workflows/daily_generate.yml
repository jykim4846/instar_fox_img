name: Daily Worry Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

jobs:
  collect-and-render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-5.4' }}
      TIMEZONE: ${{ secrets.TIMEZONE || 'Asia/Seoul' }}
      OUTPUT_DIR: ./output

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily worry pipeline
        run: python daily_pipeline.py

      - name: Upload daily artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: estj-fox-daily-output
          path: output
          if-no-files-found: ignore
